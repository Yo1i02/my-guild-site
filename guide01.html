<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>協戰注意事項 | 逸仙樓攻略</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Microsoft JhengHei", sans-serif; }
        body { 
            background-color: #0b0b0b; 
            color: #ccc; 
            line-height: 1.8;
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.9)), url('GG For The Follow.jpeg');
            background-size: cover;
            background-attachment: fixed;
            padding: 40px 20px;
        }
        /*外框線*/
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(20, 20, 20, 0.9);
            padding: 40px;
            border-radius: 15px;
            border: 1px solid #ffa600;
            box-shadow: 0 0 30px rgba(255, 166, 0, 0.1);
        }
        h1 { color: #ffa600; border-bottom: 2px solid #ff4d4d; padding-bottom: 10px; margin-bottom: 30px; }
        h2 { color: #ff4d4d; margin-top: 30px; font-size: 20px; }
        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            color: #ffa600;
            text-decoration: none;
            font-size: 14px;
        }
        .back-btn:hover { text-decoration: underline; }
        .highlight { color: #fff; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <a href=".html" class="back-btn">← 回到公會官網</a>
        <h1>協戰注意事項</h1>
        
        <h2></h2>
        <p>本週世界王：金色大頭毛毛蟲（地藏）</p>
        <h2>1. 封滅之時機點</h2>
        <p>在協戰過程中，<span class="highlight">封滅</span> 的釋放時機至關重要。建議在 BOSS 進入第二階段（血量低於 50%）且發動全屏技能前使用，以最大化中斷效果。</p>

        <h2>2. 吃人動畫處理</h2>
        <p>吃人：注意地上的掃描過去紫光。</p>

        <h2>3. 隊伍配合</h2>
        <p>請確保隊伍中至少有一名成員攜帶增益 Buff。每週三、五、日的晚上活動前，請務必在公會頻道確認出戰順序。</p>
        
        <p style="margin-top: 50px; font-size: 12px; color: #666; text-align: center;">逸仙樓攻略庫 | 最後更新：2026/03/26</p>
    </div>
